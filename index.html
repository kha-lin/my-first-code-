<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My First Code – Kha-lin</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5, #ec4899);
      color: #111827;
    }

    .card {
      background: #ffffff;
      padding: 32px 28px;
      border-radius: 18px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.35);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #111827;
    }

    h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #6b7280;
      margin-bottom: 18px;
    }

    p {
      font-size: 0.98rem;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .footer {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">#MyFirstCode</div>
    <h1>Hey, I’m Kha-lin 👋</h1>
    <h2>Hello, world!</h2>
    <p>
      My name is Kha-lin and this is my very first line of code turned into a real web page on the internet.
      More projects coming soon, so stay tuned.
    </p>
    <div class="footer">Built with HTML • Hosted on GitHub Pages</div>
  </div>
</body>
</html>
