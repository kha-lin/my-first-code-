<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Random Message</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      color: #f9fafb;
    }

    .card {
      background: #1f2937;
      padding: 32px 28px;
      border-radius: 16px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 12px;
      color: #e5e7eb;
    }

    h2 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #9ca3af;
      margin-bottom: 18px;
    }

    p {
      font-size: 1rem;
      line-height: 1.5;
      color: #e5e7eb;
      margin-bottom: 18px;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .footer {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">#MyFirstWebsite</div>
    <h1>Random Message</h1>
    <h2>Refresh to see another one</h2>
    <p id="message"></p>
    <div class="footer">Built with HTML, CSS & JavaScript</div>
  </div>

  <script>
    const messages = [
      "Small steps every day lead to big changes.",
      "Your future needs you, not your past.",
      "You don’t have to be perfect to start.",
      "Consistency beats motivation.",
      "You are learning, not failing."
    ];

    const randomMessage =
      messages[Math.floor(Math.random() * messages.length)];

    document.getElementById("message").textContent = randomMessage;
  </script>
</body>
</html>
